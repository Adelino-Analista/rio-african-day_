name: Deploy Rio African Day

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🟢 Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Instalar pnpm
        run: npm install -g pnpm

      - name: 📥 Instalar deps
        run: pnpm install --no-frozen-lockfile

      - name: 🏗️ Build Vite
        run: pnpm build

      - name: 🚀 Deploy FTP
        run: |
          apt-get update && apt-get install -y lftp
          chmod +x deploy.sh
          ./deploy.sh "${{ secrets.FTP_SERVER }}" "${{ secrets.FTP_USERNAME }}" "${{ secrets.FTP_PASSWORD }}"
          