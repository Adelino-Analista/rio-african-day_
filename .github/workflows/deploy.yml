name: Deploy Rio African Day

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🟢 Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Instalar pnpm
        run: npm install -g pnpm

      - name: 📥 Instalar deps
        run: pnpm install --no-frozen-lockfile

      - name: 🏗️ Build Vite
        run: pnpm build

      - name: 🚀 Deploy FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          # Debug: Verify secrets are set
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "❌ Error: FTP secrets are not configured"
            exit 1
          fi
          
          echo "🔍 Testing FTP connection to $FTP_SERVER..."
          
          cat > /tmp/deploy.ftp << EOF
          set ftp:ssl-allow yes
          set ftp:passive-mode on
          set net:timeout 30
          set net:max-retries 2
          open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER}
          cd public_html
          mirror -R -e --delete dist/ ./
          quit
          EOF
          
          lftp -f /tmp/deploy.ftp || {
            echo "❌ FTP deployment failed"
            exit 1
          }
          echo "✅ Deployment completed successfully"
          
